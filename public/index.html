<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AETHER - The Urban Essence. Ultra-minimalist streetwear for the modern individual.">
  <title>AETHER | Pure Urban Essence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="bg-primary text-primary">

  <!-- 💎 NAVIGATION -->
  <nav class="nav-floating glass">
    <div class="container nav-container">
      <a href="/" class="brand-logo" data-nav>AETHER</a>
      <ul class="nav-links">
        <li><a href="/shop" data-nav>SHOP</a></li>
        <li><a href="/cart" data-nav>CART (<span id="cart-count">0</span>)</a></li>
        <li id="nav-auth-links">
          <a href="/login" data-nav id="login-link">LOGIN</a>
          <a href="/account" data-nav id="account-link" style="display: none;">ACCOUNT</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- 💎 MAIN APPLICATION WRAPPER -->
  <main id="app-router">
    <!-- Content will be dynamically injected here -->
  </main>

  <!-- 💎 UI COMPONENTS (TEMPLATE MODALS) -->
  <div id="cart-drawer" class="drawer glass">
    <div class="drawer-header">
      <h2>YOUR CART</h2>
      <button id="close-cart" class="btn-icon">×</button>
    </div>
    <div id="cart-items" class="drawer-body">
      <!-- Cart items injected here -->
    </div>
    <div class="drawer-footer">
      <div class="cart-total">
        <span>TOTAL:</span>
        <span id="cart-total-value">$0.00</span>
      </div>
      <button class="btn-premium" id="checkout-btn">CHECKOUT</button>
    </div>
  </div>

  <div id="alert-system"></div>

  <!-- 💎 JS CORE -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
